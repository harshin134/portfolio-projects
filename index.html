<!DOCTYPE html>
<html>
<head>
    <title>AI Threat Detection</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">
    <h1>🛡️ AI Cybersecurity Threat Detection</h1>

    <form method="POST">
        <textarea name="text" placeholder="Enter log or message..." required></textarea>
        <button type="submit">Analyze</button>
    </form>

    {% if result %}
        <div class="result">{{ result }}</div>
    {% endif %}
</div>

</body>
</html>
